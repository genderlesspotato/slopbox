# Cluster inventory for the ops team's fleet.
#
# This file is the version-controlled (GitOps) source of truth for cluster
# identity and connectivity metadata. No credentials here — see the team's
# secrets management docs for credential wiring (Phase 2).
#
# Fields (common):
#   name               logical cluster name (unique within each type)
#   environment        prod | staging | dev
#   region             cloud region slug, e.g. aws-us-east-1
#   tags               arbitrary key/value labels for filtering
#
# Elasticsearch-specific:
#   workload           metrics | logs | traces | apm
#   host               ES endpoint URL (mutually exclusive with cloud_id)
#   cloud_id           Elastic Cloud ID (mutually exclusive with host)
#
# Kubernetes-specific:
#   context            kubectl context name
#   default_namespace  default k8s namespace (default: "default")
#
# VictoriaMetrics-specific:
#   host               HTTP base URL, e.g. http://vm.internal:8428
#   role               primary | replica (optional, informational)

elasticsearch:
  - name: prod-metrics
    environment: prod
    workload: metrics
    region: aws-us-east-1
    host: https://prod-metrics.example.com:9200
    tags:
      tier: gold

  - name: prod-logs
    environment: prod
    workload: logs
    region: aws-us-east-1
    host: https://prod-logs.example.com:9200
    tags:
      tier: gold

  - name: prod-traces
    environment: prod
    workload: traces
    region: aws-us-east-1
    host: https://prod-traces.example.com:9200
    tags:
      tier: gold

  - name: prod-apm
    environment: prod
    workload: apm
    region: aws-us-east-1
    host: https://prod-apm.example.com:9200
    tags:
      tier: gold

  - name: staging-metrics
    environment: staging
    workload: metrics
    region: aws-us-east-1
    host: https://staging-metrics.example.com:9200

  - name: staging-logs
    environment: staging
    workload: logs
    region: aws-us-east-1
    host: https://staging-logs.example.com:9200

kubernetes:
  - name: prod-us-east
    context: arn:aws:eks:us-east-1:123456789012:cluster/prod-us-east
    environment: prod
    region: aws-us-east-1
    default_namespace: monitoring
    tags:
      tier: gold

  - name: prod-eu-west
    context: arn:aws:eks:eu-west-1:123456789012:cluster/prod-eu-west
    environment: prod
    region: aws-eu-west-1
    default_namespace: monitoring
    tags:
      tier: gold

  - name: staging
    context: arn:aws:eks:us-east-1:123456789012:cluster/staging
    environment: staging
    region: aws-us-east-1
    default_namespace: monitoring

victoriametrics:
  - name: prod-metrics-a
    host: http://vm-a.internal:8428
    environment: prod
    role: primary
    region: aws-us-east-1
    tags:
      tier: gold

  - name: prod-metrics-b
    host: http://vm-b.internal:8428
    environment: prod
    role: replica
    region: aws-us-east-1
    tags:
      tier: gold

  - name: staging-metrics-a
    host: http://vm-staging-a.internal:8428
    environment: staging
    role: primary
    region: aws-us-east-1

  - name: staging-metrics-b
    host: http://vm-staging-b.internal:8428
    environment: staging
    role: replica
    region: aws-us-east-1
